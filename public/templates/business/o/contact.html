<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathe Contact | 予約・相談</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/base.css">
    <link rel="stylesheet" href="../../../assets/css/business-base.css">
    <link rel="stylesheet" href="assets/css/tailwind-built.css">
</head>
<body class="theme-business antialiased">
    <div class="organic-menu-backdrop fixed inset-0 z-[9998] bg-black/35 backdrop-blur-sm"></div>
    <button class="organic-mobile-toggle organic-panel fixed right-4 top-4 z-[10001] flex h-12 w-12 items-center justify-center rounded-full text-slate-900 md:hidden" type="button" aria-label="メニューを開く" aria-expanded="false"><span class="bar"></span><span class="bar"></span><span class="bar"></span></button>
    <div class="organic-mobile-menu fixed inset-x-4 top-20 z-[9999] rounded-[2rem] bg-background-light/95 p-6 shadow-2xl md:hidden"><nav class="flex flex-col gap-2"><a href="index.html" class="organic-nav-link rounded-2xl px-4 py-3">Home</a><a href="about.html" class="organic-nav-link rounded-2xl px-4 py-3">About</a><a href="service.html" class="organic-nav-link rounded-2xl px-4 py-3">Service</a><a href="contact.html" class="organic-nav-link active rounded-2xl px-4 py-3">Contact</a></nav></div>
    <main class="px-6 py-16 md:py-28 lg:px-20">
        <div class="mx-auto max-w-6xl">
            <p class="text-sm font-bold uppercase tracking-[0.3em] text-primary">Contact</p>
            <h1 class="mt-5 text-4xl font-black md:text-6xl"><span class="ib">いま必要な整え方を、</span><span class="ib">一緒に見つける。</span></h1>
            <div class="mt-12 grid gap-6 xl:grid-cols-[1.1fr_0.9fr]">
                <form class="organic-panel rounded-[2rem] p-8">
                    <div class="grid gap-5 md:grid-cols-2">
                        <label class="block"><span class="mb-2 block text-sm font-semibold">お名前</span><input class="organic-input" type="text" placeholder="山田 花子"></label>
                        <label class="block"><span class="mb-2 block text-sm font-semibold">メールアドレス</span><input class="organic-input" type="email" placeholder="hello@example.com"></label>
                    </div>
                    <label class="mt-5 block"><span class="mb-2 block text-sm font-semibold">相談内容</span><input class="organic-input" type="text" placeholder="体験予約 / 法人導入 / リトリート相談"></label>
                    <label class="mt-5 block"><span class="mb-2 block text-sm font-semibold">詳細</span><textarea class="organic-input min-h-40 resize-y rounded-[1.5rem]" placeholder="現在の悩みや希望する体験内容をご記入ください。"></textarea></label>
                    <button class="mt-8 rounded-full bg-primary px-6 py-4 font-bold text-background-dark" type="submit">Send Request</button>
                </form>
                <div class="space-y-6">
                    <article class="organic-panel rounded-[2rem] p-8"><p class="text-sm font-bold uppercase tracking-[0.3em] text-primary">Response</p><p class="mt-4 text-4xl font-black">24H</p><p class="mt-4 text-sm leading-8 text-slate-600"><span class="ib">初回返信では、</span><span class="ib">最適なメニュー候補と</span><span class="ib">予約可能日をご案内します。</span></p></article>
                    <article class="organic-panel rounded-[2rem] p-8"><p class="text-sm font-bold uppercase tracking-[0.3em] text-primary">Typical Needs</p><ul class="mt-4 space-y-3 text-sm leading-8 text-slate-600 dark:text-slate-300"><li><span class="ib">働き方に合わせた</span><span class="ib">継続しやすい習慣設計。</span></li><li><span class="ib">チーム向けの</span><span class="ib">ウェルネス導入相談。</span></li><li><span class="ib">リトリートやスパ体験の</span><span class="ib">企画設計。</span></li></ul></article>
                </div>
            </div>
        </div>
    </main>
    <script src="../../../assets/js/template-common.js" defer></script>
    <script src="assets/js/script.js" defer></script>
</body>
</html>
