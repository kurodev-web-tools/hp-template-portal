<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP_SPARK Contact | 相談受付</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/base.css">
    <link rel="stylesheet" href="../../../assets/css/business-base.css">
    <link rel="stylesheet" href="assets/css/tailwind-built.css">
</head>
<body class="theme-business fade-in">
    <main class="mx-auto max-w-6xl px-6 py-20">
        <a href="index.html" class="text-lg font-black text-primary">Home</a>
        <h1 class="mt-8 text-6xl font-black uppercase italic tracking-tighter">CONTACT</h1>
        <div class="mt-10 grid gap-6 xl:grid-cols-[1.1fr_0.9fr]">
            <form class="brutalist-border brutalist-shadow bg-white p-8">
                <div class="grid gap-5 md:grid-cols-2">
                    <label><span class="mb-2 block text-sm font-black uppercase">Name</span><input class="pop-input" type="text" placeholder="YAMADA TARO"></label>
                    <label><span class="mb-2 block text-sm font-black uppercase">Email</span><input class="pop-input" type="email" placeholder="INFO@EXAMPLE.COM"></label>
                </div>
                <label class="mt-5 block"><span class="mb-2 block text-sm font-black uppercase">Message</span><textarea class="pop-input min-h-40 resize-y" placeholder="PROJECT GOAL / CAMPAIGN / LAUNCH"></textarea></label>
                <button class="mt-6 brutalist-border brutalist-shadow bg-primary px-8 py-4 text-xl font-black text-white" type="submit">SEND BOOM</button>
            </form>
            <div class="brutalist-border brutalist-shadow bg-accent-yellow p-8">
                <p class="text-3xl font-black uppercase">READY FOR THE BIG BOOM?</p>
                <p class="mt-6 font-bold leading-8"><span class="ib">相談段階でも大丈夫です。</span><span class="ib">企画の熱量をどう見せるか、</span><span class="ib">一緒に整理します。</span></p>
            </div>
        </div>
    </main>
    <script src="../../../assets/js/template-common.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
