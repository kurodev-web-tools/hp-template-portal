<body class="theme-business fade-in">
    <header>
    <nav class="sticky top-0 z-50 border-b-4 border-black bg-background-light/90 px-6 py-4 backdrop-blur-md">
        <div class="mx-auto flex max-w-7xl items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="brutalist-border brutalist-shadow bg-accent-yellow p-2"><span class="material-symbols-outlined font-black text-black">bolt</span></div>
                <h1 class="text-2xl font-black italic tracking-tighter sm:text-3xl">POP_SPARK</h1>
            </div>
            <div class="hidden items-center gap-8 md:flex">
                <a href="index.html" class="text-lg font-bold hover:text-primary">Home</a>
                <a href="about.html" class="text-lg font-bold hover:text-primary">About</a>
                <a href="service.html" class="text-lg font-bold hover:text-primary">Service</a>
                <a href="contact.html" class="text-lg font-bold text-primary underline decoration-4 decoration-accent-blue underline-offset-4">Contact</a>
            </div>
        </div>
    </nav>
    </header>
    <main>
        <section class="px-6 py-16 md:py-20">
            <div class="mx-auto max-w-7xl">
                <p class="text-sm font-black uppercase tracking-[0.28em] text-primary">Contact</p>
                <h1 class="mt-6 text-4xl font-black uppercase italic tracking-tighter sm:text-5xl md:text-7xl"><span class="ib">次の BOOM を、</span><span class="ib">ここから。</span></h1>
            </div>
        </section>
        <section class="px-6 pb-20">
            <div class="mx-auto grid max-w-7xl gap-6 xl:grid-cols-[1.1fr_0.9fr]">
                <form class="brutalist-border brutalist-shadow bg-white p-6 sm:p-8">
                    <div class="grid gap-5 md:grid-cols-2">
                        <label><span class="mb-2 block text-sm font-black uppercase">Name</span><input class="pop-input" type="text" placeholder="YAMADA TARO"></label>
                        <label><span class="mb-2 block text-sm font-black uppercase">Email</span><input class="pop-input" type="email" placeholder="INFO@EXAMPLE.COM"></label>
                    </div>
                    <label class="mt-5 block"><span class="mb-2 block text-sm font-black uppercase">Project Type</span><input class="pop-input" type="text" placeholder="CAMPAIGN / LAUNCH / EVENT"></label>
                    <label class="mt-5 block"><span class="mb-2 block text-sm font-black uppercase">Message</span><textarea class="pop-input min-h-40 resize-y" placeholder="PROJECT GOAL / TARGET / RELEASE TIMING"></textarea></label>
                    <button class="mt-6 brutalist-border brutalist-shadow bg-primary px-5 py-3 text-base font-black text-white sm:px-8 sm:py-4 sm:text-xl" type="submit">SEND BOOM</button>
                </form>
                <div class="grid gap-6">
                    <div class="brutalist-border brutalist-shadow bg-accent-yellow p-6 sm:p-8">
                        <p class="text-2xl font-black uppercase sm:text-3xl">READY FOR THE BIG BOOM?</p>
                        <p class="mt-6 font-bold leading-8"><span class="ib">相談段階でも大丈夫です。</span><span class="ib">企画の熱量をどう見せるか、一緒に整理します。</span></p>
                    </div>
                    <div class="brutalist-border brutalist-shadow bg-accent-blue p-6 text-white sm:p-8">
                        <p class="text-sm font-black uppercase tracking-[0.24em]">Response</p>
                        <p class="mt-4 text-3xl font-black uppercase">48 Hours</p>
                        <p class="mt-4 font-bold leading-8">初回返信で、進め方と必要素材の整理を返します。</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="border-t-4 border-black bg-background-light px-6 py-8">
        <div class="mx-auto flex max-w-7xl items-center justify-between gap-6">
            <p class="text-sm font-black uppercase tracking-[0.24em]">POP_SPARK</p>
            <div class="flex gap-5 text-sm font-bold">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="service.html">Service</a>
            </div>
        </div>
