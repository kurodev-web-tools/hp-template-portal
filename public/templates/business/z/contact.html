<body class="tw-bg-stone-50 tw-text-stone-900 z-inner">
    <div class="z-shell">
        <header class="z-header" data-header><a class="z-brand" href="index.html">ZEN GARDEN</a><nav class="z-nav" aria-label="主要ナビゲーション"><a href="index.html">Home</a><a href="service.html">Practice</a><a href="about.html">Philosophy</a><a href="contact.html">Reserve</a></nav><button class="z-menu" type="button" data-menu-toggle aria-expanded="false" aria-controls="z-mobile-menu">Menu</button></header>

        <main class="z-page">
            <section class="z-page-hero reveal is-visible"><p class="eyebrow">Reserve</p><h1>静かな時間を、必要な分だけ。</h1><p>一人で整えたいのか、少人数で深めたいのか。希望に合わせて最適なプランを案内します。</p></section>
            <section class="z-contact reveal">
                <form class="z-form" action="#" method="post">
                    <label for="z-name">お名前</label>
                    <input id="z-name" name="name" type="text" placeholder="例: 田中 みどり">
                    <label for="z-email">メールアドレス</label>
                    <input id="z-email" name="email" type="email" placeholder="example@example.jp">
                    <label for="z-purpose">ご希望の目的</label>
                    <input id="z-purpose" name="purpose" type="text" placeholder="例: 個人リトリート、少人数セッション">
                    <label for="z-message">希望日時・ご相談内容</label>
                    <textarea id="z-message" name="message" rows="6" placeholder="希望時期、人数、気になっているプログラムなど"></textarea>
                    <button class="z-button z-solid" type="submit">送信する</button>
                </form>
                <aside class="z-aside">
                    <h2>予約前のご案内</h2>
                    <ul class="z-list"><li>静かな運営を前提に、少人数で受付しています。</li><li>ご希望日時によっては代替日程を提案する場合があります。</li><li>フォームはテンプレート表示用であり、送信先処理は未接続です。</li></ul>
                </aside>
            </section>
        </main>
