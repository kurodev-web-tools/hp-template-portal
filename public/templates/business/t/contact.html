<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUST GUARD | お問い合わせ</title>
    <meta name="description" content="TRUST GUARD への相談フォーム。現状の課題、体制、希望スケジュールを共有できます。">
    <link rel="canonical" href="https://example.com/templates/business/t/contact.html">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ja_JP">
    <meta property="og:title" content="TRUST GUARD | お問い合わせ">
    <meta property="og:description" content="課題の整理段階から相談できるセキュリティ運用設計の問い合わせページ。">
    <meta property="og:url" content="https://example.com/templates/business/t/contact.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="robots" content="index,follow">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "name": "TRUST GUARD Contact",
      "url": "https://example.com/templates/business/t/contact.html"
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Inter:wght@500;600;700;800&family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/tailwind-built.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="t-shell relative min-h-screen overflow-x-hidden">
    <header class="sticky top-0 z-40 border-b border-[#3a4655] bg-[rgba(13,17,23,0.92)] backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4 lg:px-8">
            <a class="flex items-center gap-3 no-underline" href="index.html"><span class="material-symbols-outlined text-3xl text-[#8fd5ff]">shield_locked</span><div><div class="text-sm font-semibold uppercase tracking-[0.28em] text-[#8fd5ff]">Trust Guard</div><div class="text-lg font-extrabold tracking-tight text-white">Operational Stability</div></div></a>
            <nav class="hidden items-center gap-8 text-sm font-semibold uppercase tracking-[0.12em] text-slate-300 lg:flex"><a href="index.html">Home</a><a href="service.html">Services</a><a href="about.html">Approach</a><a class="text-white" href="contact.html">Contact</a></nav>
            <button class="inline-flex h-12 w-12 items-center justify-center border border-[#3a4655] bg-[#161d26] text-white lg:hidden" type="button" aria-label="メニューを開く" aria-controls="t-mobile-menu" aria-expanded="false" data-menu-button data-menu-toggle aria-controls="t-mobile-menu"><span class="material-symbols-outlined">menu</span></button>
        </div>
    </header>
    <div class="t-mobile-backdrop fixed inset-0 z-40 bg-[rgba(6,9,12,0.74)]" data-menu-backdrop></div>
    <aside id="t-mobile-menu" class="t-mobile-menu fixed right-0 top-0 z-50 flex h-full w-[min(24rem,88vw)] flex-col gap-8 border-l border-[#3a4655] bg-[#0f141b] p-6" data-mobile-menu>
        <div class="flex items-center justify-between"><div class="text-lg font-bold text-white">TRUST GUARD</div><button class="inline-flex h-11 w-11 items-center justify-center border border-[#3a4655] text-white" type="button" aria-label="メニューを閉じる" data-menu-close data-menu-toggle aria-controls="t-mobile-menu"><span class="material-symbols-outlined">close</span></button></div>
        <nav class="flex flex-col gap-4 text-base font-semibold text-slate-200"><a href="index.html">Home</a><a href="service.html">Services</a><a href="about.html">Approach</a><a href="contact.html">Contact</a></nav>
    </aside>
    <main>
        <section class="border-b border-[#3a4655]">
            <div class="mx-auto max-w-7xl px-5 py-16 lg:grid lg:grid-cols-[0.88fr_1.12fr] lg:gap-10 lg:px-8 lg:py-24">
                <div>
                    <span class="t-kicker">Contact</span>
                    <h1 class="mt-6 text-5xl font-black tracking-[-0.05em] text-white lg:text-7xl">状況が曖昧でも、現場の情報から整理します。</h1>
                    <p class="mt-6 text-lg leading-8 text-slate-300">導入済みのツール一覧がなくても構いません。困っている場面、監査で指摘された項目、通知が多すぎる時間帯など、現場の断片情報から整理を始めます。</p>
                    <div class="t-number-note mt-8 px-4 py-4 text-sm leading-7">回答時間、導入期間、改善幅などの数値は公開時に運用実態へ差し替える想定です。デモでは説明用の仮値を使用してください。</div>
                </div>
                <div class="t-panel mt-10 p-6 lg:mt-0 lg:p-8">
                    <form class="grid gap-5" action="#" method="post" data-demo-form>
                        <div class="t-form-field">
                            <label for="t-company">会社名</label>
                            <input id="t-company" name="company" type="text" placeholder="例: Sample Holdings">
                        </div>
                        <div class="grid gap-5 md:grid-cols-2">
                            <div class="t-form-field">
                                <label for="t-name">担当者名</label>
                                <input id="t-name" name="name" type="text" placeholder="例: 山田 花子">
                            </div>
                            <div class="t-form-field">
                                <label for="t-email">メールアドレス</label>
                                <input id="t-email" name="email" type="email" placeholder="security@example.com">
                            </div>
                        </div>
                        <div class="t-form-field">
                            <label for="t-stage">相談したい内容</label>
                            <select id="t-stage" name="stage">
                                <option>現状診断をしたい</option>
                                <option>監視運用を整えたい</option>
                                <option>復旧演習を行いたい</option>
                                <option>監査対応を整理したい</option>
                            </select>
                        </div>
                        <div class="t-form-field">
                            <label for="t-message">現在の状況</label>
                            <textarea id="t-message" name="message" placeholder="運用上の課題、相談したい背景、対象システムなど"></textarea>
                        </div>
                        <button class="t-rect-button t-rect-button--accent" type="submit">内容を送信</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer class="border-t border-[#3a4655] bg-[#0c1015]"><div class="mx-auto max-w-7xl px-5 py-10 text-sm text-slate-400 lg:px-8">© 2026 TRUST GUARD</div></footer>
</div>
<script src="assets/js/script.js" defer></script>
</body>
</html>
