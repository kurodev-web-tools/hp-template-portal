<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Drawing consultation desk</title>
  <desc id="desc">A quiet consultation desk with blueprint sheets, a laptop, and a measurement ruler in warm studio light.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06090d"/>
      <stop offset="54%" stop-color="#0c1218"/>
      <stop offset="100%" stop-color="#162230"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f1e4"/>
      <stop offset="100%" stop-color="#d9d0c2"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a7bfd1"/>
      <stop offset="100%" stop-color="#5f7485"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3f8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f2a65a" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.36"/>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#8aa0b6" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>
  <circle cx="900" cy="170" r="250" fill="#f2a65a" opacity="0.1" filter="url(#blur)"/>
  <circle cx="230" cy="680" r="280" fill="#506376" opacity="0.09" filter="url(#blur)"/>

  <g filter="url(#shadow)">
    <rect x="116" y="178" width="388" height="520" rx="30" fill="#0d141b" stroke="#334452" stroke-opacity="0.7"/>
    <rect x="146" y="212" width="330" height="452" rx="24" fill="#0f1821" stroke="#415466" stroke-opacity="0.72"/>
    <rect x="168" y="236" width="286" height="120" rx="18" fill="url(#paper)" opacity="0.95"/>
    <path d="M 194 264 H 392" stroke="#7d8f9f" stroke-opacity="0.4" stroke-width="4"/>
    <path d="M 194 292 H 360" stroke="#7d8f9f" stroke-opacity="0.28" stroke-width="4"/>
    <path d="M 194 320 H 338" stroke="#7d8f9f" stroke-opacity="0.18" stroke-width="4"/>
    <path d="M 196 250 C 220 232, 250 230, 274 246" fill="none" stroke="#f2a65a" stroke-opacity="0.52" stroke-width="3"/>
    <rect x="176" y="382" width="280" height="248" rx="22" fill="url(#glass)" stroke="#314151" stroke-opacity="0.66"/>
    <path d="M 194 412 H 414" stroke="#dce4ec" stroke-opacity="0.26" stroke-width="3"/>
    <path d="M 194 444 H 390" stroke="#dce4ec" stroke-opacity="0.18" stroke-width="3"/>
    <path d="M 194 476 H 372" stroke="#dce4ec" stroke-opacity="0.14" stroke-width="3"/>
    <g transform="translate(196 538)">
      <rect x="0" y="0" width="214" height="76" rx="18" fill="#f2a65a" fill-opacity="0.17" stroke="#f2a65a" stroke-opacity="0.28"/>
      <path d="M 20 54 H 190" stroke="#f2a65a" stroke-opacity="0.68" stroke-width="4"/>
      <path d="M 20 28 H 160" stroke="#b9c7d4" stroke-opacity="0.24" stroke-width="4"/>
      <circle cx="176" cy="28" r="12" fill="#f2a65a" fill-opacity="0.46"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="612" y="214" width="470" height="420" rx="34" fill="#0c1319" stroke="#344554" stroke-opacity="0.72"/>
    <rect x="648" y="248" width="398" height="254" rx="24" fill="#0f1821" stroke="#4b5d6d" stroke-opacity="0.7"/>
    <rect x="680" y="276" width="338" height="198" rx="18" fill="#0b1116" stroke="#6c7f90" stroke-opacity="0.22"/>
    <path d="M 704 306 H 992" stroke="#f2a65a" stroke-opacity="0.45" stroke-width="3"/>
    <path d="M 704 338 H 942" stroke="#a8b6c4" stroke-opacity="0.24" stroke-width="3"/>
    <path d="M 704 370 H 966" stroke="#a8b6c4" stroke-opacity="0.16" stroke-width="3"/>
    <circle cx="866" cy="382" r="58" fill="url(#ink)"/>
    <circle cx="866" cy="382" r="30" fill="#0c1218"/>
    <rect x="716" y="414" width="122" height="26" rx="13" fill="#f2a65a" fill-opacity="0.45"/>
    <rect x="716" y="452" width="172" height="18" rx="9" fill="#dce4ec" fill-opacity="0.18"/>
    <rect x="906" y="414" width="60" height="88" rx="14" fill="#dce4ec" fill-opacity="0.16"/>
  </g>

  <g transform="translate(696 548)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="164" rx="28" fill="#111923" stroke="#445566" stroke-opacity="0.7"/>
    <path d="M 26 34 H 234" stroke="#f2a65a" stroke-opacity="0.42" stroke-width="3"/>
    <path d="M 26 70 H 206" stroke="#cbd5df" stroke-opacity="0.22" stroke-width="3"/>
    <path d="M 26 106 H 186" stroke="#cbd5df" stroke-opacity="0.16" stroke-width="3"/>
    <rect x="26" y="112" width="92" height="22" rx="11" fill="#f2a65a" fill-opacity="0.36"/>
    <rect x="130" y="112" width="108" height="22" rx="11" fill="#cbd5df" fill-opacity="0.14"/>
  </g>

  <rect x="148" y="746" width="906" height="46" rx="23" fill="#f2a65a" fill-opacity="0.08"/>
</svg>
