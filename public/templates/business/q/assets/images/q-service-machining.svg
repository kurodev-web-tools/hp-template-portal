<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Machining close-up</title>
  <desc id="desc">Close-up industrial scene showing a fixture, machining spindle, and warm inspection light.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05080c"/>
      <stop offset="56%" stop-color="#0d151d"/>
      <stop offset="100%" stop-color="#16222d"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2a65a" stop-opacity="0.44"/>
      <stop offset="100%" stop-color="#f2a65a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3f8"/>
      <stop offset="35%" stop-color="#a0acb7"/>
      <stop offset="72%" stop-color="#626d79"/>
      <stop offset="100%" stop-color="#dbe2e9"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#8aa0b6" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>
  <ellipse cx="940" cy="140" rx="220" ry="150" fill="#f2a65a" opacity="0.1" filter="url(#blur)"/>
  <ellipse cx="280" cy="740" rx="280" ry="180" fill="#4f6174" opacity="0.08" filter="url(#blur)"/>

  <rect x="122" y="188" width="956" height="520" rx="34" fill="#0b1218" stroke="#314151" stroke-opacity="0.7" filter="url(#shadow)"/>
  <rect x="166" y="226" width="868" height="444" rx="26" fill="#111a22" stroke="#364656" stroke-opacity="0.82"/>

  <g opacity="0.8">
    <rect x="206" y="268" width="300" height="138" rx="18" fill="#e8eef4" fill-opacity="0.12"/>
    <rect x="224" y="288" width="196" height="12" rx="6" fill="#f2a65a" fill-opacity="0.56"/>
    <rect x="224" y="312" width="240" height="8" rx="4" fill="#c9d3dd" fill-opacity="0.24"/>
    <rect x="224" y="332" width="214" height="8" rx="4" fill="#c9d3dd" fill-opacity="0.18"/>
  </g>

  <g transform="translate(236 450)">
    <rect x="0" y="0" width="424" height="166" rx="26" fill="#0d141b" stroke="#4a5c6d" stroke-opacity="0.7"/>
    <path d="M 28 112 L 394 112" stroke="#f2a65a" stroke-opacity="0.42" stroke-width="4"/>
    <path d="M 28 60 L 374 60" stroke="#92a5b8" stroke-opacity="0.34" stroke-width="4"/>
    <g transform="translate(92 40)">
      <circle cx="0" cy="44" r="54" fill="url(#metal)"/>
      <circle cx="0" cy="44" r="22" fill="#212d37"/>
      <path d="M -52 44 H 52" stroke="#f2a65a" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
      <path d="M 0 -12 V 100" stroke="#f2a65a" stroke-opacity="0.2" stroke-width="6" stroke-linecap="round"/>
    </g>
    <g transform="translate(226 28)">
      <rect x="0" y="0" width="120" height="92" rx="18" fill="#dfe7ef" fill-opacity="0.15" stroke="#5b6f81" stroke-opacity="0.45"/>
      <path d="M 18 68 L 102 68" stroke="#f2a65a" stroke-opacity="0.62" stroke-width="4"/>
      <path d="M 22 34 L 92 34" stroke="#dfe7ef" stroke-opacity="0.32" stroke-width="4"/>
      <circle cx="88" cy="18" r="14" fill="#f2a65a" fill-opacity="0.38"/>
    </g>
    <g transform="translate(330 24)">
      <path d="M 0 8 L 64 22 L 92 76 L 40 116 L -10 82 Z" fill="#eef3f8" fill-opacity="0.18" stroke="#dfe7ef" stroke-opacity="0.28"/>
      <path d="M 16 32 L 64 46" stroke="#f2a65a" stroke-opacity="0.7" stroke-width="4"/>
      <path d="M 10 58 L 68 76" stroke="#92a5b8" stroke-opacity="0.32" stroke-width="4"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="696" y="232" width="332" height="216" rx="24" fill="#0e151d" stroke="#3a4a59" stroke-opacity="0.82"/>
    <path d="M 732 276 H 972" stroke="#f2a65a" stroke-opacity="0.5" stroke-width="3"/>
    <path d="M 732 314 H 946" stroke="#b4c1cc" stroke-opacity="0.24" stroke-width="3"/>
    <path d="M 732 352 H 958" stroke="#b4c1cc" stroke-opacity="0.16" stroke-width="3"/>
    <g transform="translate(744 386)">
      <rect x="0" y="-84" width="92" height="20" rx="10" fill="#f2a65a" fill-opacity="0.42"/>
      <rect x="16" y="-74" width="58" height="136" rx="20" fill="url(#metal)"/>
      <circle cx="45" cy="-6" r="18" fill="#202b35"/>
    </g>
    <g transform="translate(858 378)">
      <path d="M 0 -58 C 34 -48, 56 -24, 66 10 C 56 38, 26 58, -12 66 C -26 44, -28 -4, 0 -58Z" fill="#111924" stroke="#5a6d7e" stroke-opacity="0.42"/>
      <path d="M 12 -24 C 32 -18, 44 -2, 50 14" fill="none" stroke="#f2a65a" stroke-opacity="0.75" stroke-width="7" stroke-linecap="round"/>
    </g>
  </g>

  <rect x="156" y="734" width="888" height="52" rx="26" fill="url(#beam)"/>
</svg>
