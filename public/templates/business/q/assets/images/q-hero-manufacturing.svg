<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Manufacturing snapshot</title>
  <desc id="desc">Dark industrial workspace with a machined part, blueprint sheets, and measurement tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06090d"/>
      <stop offset="52%" stop-color="#0c1219"/>
      <stop offset="100%" stop-color="#15222e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2a65a" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#f2a65a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="34%" stop-color="#9ca7b4"/>
      <stop offset="72%" stop-color="#5d6875"/>
      <stop offset="100%" stop-color="#d5dbe2"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17222d"/>
      <stop offset="100%" stop-color="#090d12"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#8aa0b6" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>
  <circle cx="920" cy="160" r="260" fill="#f2a65a" opacity="0.11" filter="url(#softBlur)"/>
  <circle cx="250" cy="660" r="280" fill="#6c7f93" opacity="0.08" filter="url(#softBlur)"/>

  <g filter="url(#shadow)">
    <rect x="114" y="180" width="390" height="520" rx="28" fill="#0d141b" stroke="#314151" stroke-opacity="0.7"/>
    <rect x="140" y="214" width="338" height="136" rx="20" fill="#101924" stroke="#2d3b49" stroke-opacity="0.85"/>
    <path d="M 164 248 H 456" stroke="#445566" stroke-opacity="0.45" stroke-width="2"/>
    <path d="M 164 282 H 438" stroke="#445566" stroke-opacity="0.3" stroke-width="2"/>
    <path d="M 164 316 H 420" stroke="#445566" stroke-opacity="0.18" stroke-width="2"/>
    <g opacity="0.85">
      <rect x="174" y="236" width="90" height="18" rx="9" fill="#f2a65a" fill-opacity="0.65"/>
      <rect x="276" y="236" width="116" height="18" rx="9" fill="#dce4ec" fill-opacity="0.26"/>
    </g>

    <rect x="144" y="378" width="330" height="270" rx="26" fill="url(#desk)" stroke="#2a3641" stroke-opacity="0.8"/>
    <path d="M 176 414 L 428 414" stroke="#415162" stroke-opacity="0.34" stroke-width="3"/>
    <path d="M 176 450 L 388 450" stroke="#415162" stroke-opacity="0.28" stroke-width="3"/>
    <path d="M 176 486 L 405 486" stroke="#415162" stroke-opacity="0.22" stroke-width="3"/>

    <g transform="translate(208 532)">
      <rect x="-58" y="-88" width="124" height="54" rx="14" fill="#eef3f8" fill-opacity="0.16" stroke="#dce4ec" stroke-opacity="0.24"/>
      <rect x="-42" y="-66" width="90" height="8" rx="4" fill="#f2a65a" fill-opacity="0.72"/>
      <path d="M 56 -32 C 32 10, 0 52, -40 98" fill="none" stroke="#9db0c2" stroke-opacity="0.36" stroke-width="10" stroke-linecap="round"/>
      <path d="M 58 -18 C 36 20, 4 60, -30 96" fill="none" stroke="#f2a65a" stroke-opacity="0.42" stroke-width="4" stroke-linecap="round"/>
    </g>

    <g transform="translate(358 492)">
      <ellipse cx="0" cy="0" rx="112" ry="74" fill="#091015" stroke="#607487" stroke-opacity="0.34"/>
      <ellipse cx="0" cy="0" rx="88" ry="46" fill="url(#steel)"/>
      <ellipse cx="0" cy="0" rx="56" ry="26" fill="#24303c" opacity="0.82"/>
      <circle cx="54" cy="-8" r="14" fill="#f2a65a"/>
      <rect x="82" y="-98" width="26" height="196" rx="13" fill="#dfe7ef" fill-opacity="0.24"/>
    </g>

    <g transform="translate(176 562)">
      <rect x="0" y="0" width="214" height="90" rx="18" fill="#0f1720" stroke="#556778" stroke-opacity="0.55"/>
      <path d="M 22 58 H 188" stroke="#f2a65a" stroke-opacity="0.65" stroke-width="3"/>
      <path d="M 22 26 H 168" stroke="#9fb0bf" stroke-opacity="0.34" stroke-width="3"/>
      <circle cx="174" cy="28" r="12" fill="#f2a65a" fill-opacity="0.38"/>
    </g>
  </g>

  <g opacity="0.72">
    <rect x="560" y="190" width="520" height="20" rx="10" fill="#f2a65a" fill-opacity="0.18"/>
    <rect x="560" y="226" width="388" height="16" rx="8" fill="#c8d2dd" fill-opacity="0.14"/>
    <rect x="560" y="254" width="450" height="16" rx="8" fill="#c8d2dd" fill-opacity="0.1"/>
    <rect x="560" y="282" width="316" height="16" rx="8" fill="#c8d2dd" fill-opacity="0.08"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="674" y="360" width="384" height="290" rx="30" fill="#0d141b" stroke="#334452" stroke-opacity="0.7"/>
    <path d="M 720 420 L 998 420" stroke="#f2a65a" stroke-opacity="0.55" stroke-width="3"/>
    <path d="M 720 460 L 944 460" stroke="#8ea0b2" stroke-opacity="0.34" stroke-width="3"/>
    <path d="M 720 500 L 980 500" stroke="#8ea0b2" stroke-opacity="0.22" stroke-width="3"/>
    <g transform="translate(744 564)">
      <rect x="0" y="-116" width="170" height="28" rx="14" fill="#f2a65a" fill-opacity="0.55"/>
      <rect x="18" y="-94" width="134" height="140" rx="18" fill="url(#steel)"/>
      <circle cx="86" cy="-12" r="28" fill="#24303c"/>
      <circle cx="86" cy="-12" r="16" fill="#d5dbe2"/>
      <rect x="160" y="-82" width="74" height="16" rx="8" fill="#f2a65a" fill-opacity="0.5"/>
    </g>
    <g transform="translate(918 552)">
      <path d="M 0 -82 C 42 -72, 76 -34, 86 6 C 66 52, 30 78, -6 86 C -26 54, -28 2, 0 -82Z" fill="#111a23" stroke="#5f7387" stroke-opacity="0.42"/>
      <path d="M 14 -46 C 42 -36, 64 -12, 70 18" fill="none" stroke="#f2a65a" stroke-opacity="0.7" stroke-width="8" stroke-linecap="round"/>
      <circle cx="42" cy="10" r="16" fill="#f2a65a" fill-opacity="0.45"/>
    </g>
  </g>

  <rect x="90" y="760" width="1020" height="48" rx="24" fill="url(#glow)"/>
</svg>
