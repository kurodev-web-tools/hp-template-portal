<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Urban Street へのお問い合わせ。コラボ、制作相談、ドロップ通知の登録はこちら。">
    <title>Contact | Urban Street</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&family=Space+Grotesk:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;900&family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/base.css">
    <link rel="stylesheet" href="../../../assets/css/business-base.css">
    <link rel="stylesheet" href="assets/css/tailwind-built.css">
</head>
<body class="theme-business antialiased">
    <div class="urban-grit-overlay fixed inset-0 pointer-events-none"></div>
    <div class="urban-menu-backdrop fixed inset-0 z-[9998] bg-black/55 backdrop-blur-sm lg:hidden"></div>
    <button class="urban-mobile-toggle fixed right-4 top-4 z-[10001] flex h-12 w-12 items-center justify-center rounded-xl border border-primary/20 bg-background-dark/90 text-white shadow-2xl backdrop-blur lg:hidden" type="button" aria-label="メニューを開く" aria-expanded="false"><span class="bar"></span><span class="bar"></span><span class="bar"></span></button>
    <div class="urban-mobile-menu fixed inset-x-4 top-20 z-[9999] rounded-[1.6rem] border border-concrete/80 bg-background-dark/95 p-6 text-white shadow-2xl lg:hidden">
        <div class="mb-6 flex items-center justify-between"><div><p class="urban-stencil text-2xl text-primary">URBAN_STREET</p><p class="font-sans text-xs uppercase tracking-[0.26em] text-slate-400">Street Exit</p></div></div>
        <nav class="flex flex-col gap-2"><a href="index.html" class="urban-nav-link rounded-xl px-4 py-3">Home</a><a href="about.html" class="urban-nav-link rounded-xl px-4 py-3">About</a><a href="service.html" class="urban-nav-link rounded-xl px-4 py-3">Service</a><a href="contact.html" class="urban-nav-link active rounded-xl px-4 py-3">Contact</a></nav>
    </div>
    <header class="sticky top-0 z-50 border-b-4 border-concrete bg-background-dark/95 px-6 py-4 backdrop-blur lg:px-10">
        <div class="mx-auto flex max-w-[1440px] items-center justify-between gap-6">
            <a href="index.html" class="flex items-center gap-3 text-white"><div class="bg-primary p-1 text-background-dark"><span class="material-symbols-outlined text-3xl">bolt</span></div><div><p class="urban-stencil text-3xl text-white">URBAN_STREET</p><p class="font-sans text-[11px] uppercase tracking-[0.26em] text-slate-400">Raw energy / no rules</p></div></a>
            <nav class="hidden items-center gap-2 lg:flex"><a href="index.html" class="urban-nav-link rounded-full px-4 py-2 text-sm font-black uppercase tracking-[0.14em]">Home</a><a href="about.html" class="urban-nav-link rounded-full px-4 py-2 text-sm font-black uppercase tracking-[0.14em]">About</a><a href="service.html" class="urban-nav-link rounded-full px-4 py-2 text-sm font-black uppercase tracking-[0.14em]">Service</a><a href="contact.html" class="urban-nav-link active rounded-full px-4 py-2 text-sm font-black uppercase tracking-[0.14em]">Contact</a></nav>
            <div class="hidden items-center gap-3 lg:flex"><a href="contact.html" class="rounded-full bg-primary px-5 py-3 text-sm font-black uppercase tracking-[0.14em] text-background-dark">Connect</a></div>
        </div>
    </header>
    <main class="overflow-hidden px-6 py-16 lg:px-10 lg:py-20">
        <div class="mx-auto grid max-w-[1440px] gap-10 xl:grid-cols-[1.02fr_0.98fr]">
            <div class="space-y-6">
                <span class="inline-block rotate-[-5deg] bg-primary px-4 py-2 text-sm font-black uppercase tracking-[0.26em] text-background-dark">Stay Tuned</span>
                <h1 class="urban-stencil text-4xl md:text-7xl text-slate-900 dark:text-white"><span class="ib">LINK_UP</span></h1>
                <p class="max-w-2xl text-base font-bold leading-8 text-slate-700 dark:text-slate-300"><span class="ib">コラボ、</span><span class="ib">撮影、</span><span class="ib">イベント、</span><span class="ib">通知登録まで。</span><span class="ib">街で起きる次の動きに、</span><span class="ib">最短距離でつながるための窓口です。</span></p>
                <div class="grid gap-4 md:grid-cols-2">
                    <article class="urban-card rounded-[1.4rem] p-6"><p class="text-xs font-black uppercase tracking-[0.24em] text-primary">Collab</p><p class="mt-3 text-sm leading-8 text-slate-600 dark:text-slate-300"><span class="ib">アーティスト、ブランド、ローカルチームとの共同企画。</span></p></article>
                    <article class="urban-card rounded-[1.4rem] p-6"><p class="text-xs font-black uppercase tracking-[0.24em] text-primary">Drop Notice</p><p class="mt-3 text-sm leading-8 text-slate-600 dark:text-slate-300"><span class="ib">限定ドロップや先行アクセスの通知登録。</span></p></article>
                </div>
            </div>
            <div class="taped-panel">
                <div class="tape t-top"></div>
                <div class="tape t-bottom"></div>
                <div class="rounded-[1.4rem] border-2 border-black bg-white p-8 text-black shadow-[16px_16px_0_0_rgba(17,17,17,0.15)] dark:border-white dark:bg-background-dark dark:text-white">
                    <h2 class="urban-stencil text-4xl text-black dark:text-white">STAY_TUNED</h2>
                    <form class="mt-8 space-y-5">
                        <div><label class="mb-2 block text-xs font-black uppercase tracking-[0.22em] text-slate-500 dark:text-slate-400" for="alias">Street Alias</label><input id="alias" class="urban-input" type="text" placeholder="GHOST_PANC"></div>
                        <div><label class="mb-2 block text-xs font-black uppercase tracking-[0.22em] text-slate-500 dark:text-slate-400" for="social">Social ID</label><input id="social" class="urban-input" type="text" placeholder="@urban_core"></div>
                        <div><label class="mb-2 block text-xs font-black uppercase tracking-[0.22em] text-slate-500 dark:text-slate-400" for="email">Email Node</label><input id="email" class="urban-input" type="email" placeholder="alias@street.com"></div>
                        <div><label class="mb-2 block text-xs font-black uppercase tracking-[0.22em] text-slate-500 dark:text-slate-400" for="message">Graffiti (Message)</label><textarea id="message" class="urban-input min-h-32 resize-y" placeholder="LEAVE YOUR MARK..."></textarea></div>
                        <button class="w-full rotate-[1deg] bg-black px-6 py-4 font-black uppercase tracking-[0.18em] text-white shadow-[10px_10px_0_0_rgba(0,0,0,0.12)] dark:bg-primary dark:text-background-dark" type="submit">Link Up</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="../../../assets/js/template-common.js" defer></script>
    <script src="assets/js/script.js" defer></script>
</body>
</html>
