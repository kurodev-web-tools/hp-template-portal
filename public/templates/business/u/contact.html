<head>
    <meta charset="UTF-8">

    <meta name="description" content="URBAN STREET への制作相談、コラボ、ポップアップ相談を受けるコンタクトページです。">

    <meta property="og:type" content="website">
    <meta property="og:locale" content="ja_JP">
    <meta property="og:title" content="URBAN STREET | Contact Desk">
    <meta property="og:description" content="誌面クレジットページ風のコンタクト導線。">
    <meta property="og:url" content="https://example.com/templates/business/u/contact.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="robots" content="index,follow">
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"ContactPage","name":"URBAN STREET Contact","url":"https://example.com/templates/business/u/contact.html"}</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/tailwind-built.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="contact">
<div class="u-shell relative min-h-screen overflow-x-hidden">
    <header class="sticky top-0 z-40 border-b-4 border-[#38322f] bg-[rgba(10,10,10,0.92)] backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4 lg:px-8">
            <a class="flex items-center gap-3 no-underline" href="index.html"><span class="u-kicker">contact desk</span><span class="text-2xl font-bold uppercase tracking-[-0.05em] text-white">URBAN STREET</span></a>
            <nav class="hidden items-center gap-8 text-sm font-bold uppercase tracking-[0.14em] text-slate-300 lg:flex">
                <a class="u-nav-link" href="index.html" data-page-link="index">Home</a>
                <a class="u-nav-link" href="service.html" data-page-link="service">Services</a>
                <a class="u-nav-link" href="about.html" data-page-link="about">Manifesto</a>
                <a class="u-nav-link" href="contact.html" data-page-link="contact">Contact</a>
            </nav>
            <button class="inline-flex h-12 w-12 items-center justify-center border-2 border-[#38322f] bg-[#181818] text-white lg:hidden" type="button" aria-label="メニューを開く" aria-controls="u-mobile-menu" aria-expanded="false" data-menu-button><span class="material-symbols-outlined">menu</span></button>
        </div>
    </header>
    <div class="u-mobile-backdrop fixed inset-0 z-40 bg-[rgba(0,0,0,0.72)]" data-menu-backdrop></div>
    <aside id="u-mobile-menu" class="u-mobile-menu fixed right-0 top-0 z-50 flex h-full w-[min(24rem,88vw)] flex-col gap-8 border-l-4 border-[#ff7a00] bg-[#141414] p-6" data-mobile-menu aria-hidden="true">
        <div class="flex items-center justify-between"><div class="text-xl font-bold uppercase text-white">URBAN STREET</div><button class="inline-flex h-11 w-11 items-center justify-center border-2 border-[#38322f] text-white" type="button" aria-label="メニューを閉じる" data-menu-close><span class="material-symbols-outlined">close</span></button></div>
        <nav class="flex flex-col gap-4 text-base font-bold uppercase text-slate-200">
            <a class="u-mobile-link" href="index.html" data-page-link="index">Home</a>
            <a class="u-mobile-link" href="service.html" data-page-link="service">Services</a>
            <a class="u-mobile-link" href="about.html" data-page-link="about">Manifesto</a>
            <a class="u-mobile-link" href="contact.html" data-page-link="contact">Contact</a>
        </nav>
    </aside>

    <main>
        <section class="px-5 py-10 lg:px-8 lg:py-14">
            <div class="mx-auto max-w-7xl u-editorial-grid">
                <article class="u-paper-card col-span-12 p-8 lg:col-span-5">
                    <span class="u-tape">credit page</span>
                    <h1 class="mt-6 text-5xl font-bold uppercase leading-[0.92] tracking-[-0.06em] text-[#111] lg:text-7xl">コラボでも、<br>ルック制作でも。</h1>
                    <p class="mt-6 font-['Noto_Sans_JP'] text-base leading-8 text-[#2a2622]">やりたいことが一言でまとまっていなくても大丈夫です。イベント、映像、プロダクト、LP、SNS 展開までまとめて相談できます。</p>
                    <div class="u-note mt-8 px-4 py-4 font-['Noto_Sans_JP'] text-sm leading-7">申込件数や開催回数などの数値はモック用です。運用時は実績値へ差し替えてください。</div>
                </article>
                <article class="u-list-card col-span-12 p-6 lg:col-span-7">
                    <form class="grid gap-5" action="#" method="post" data-demo-form>
                        <div class="grid gap-5 md:grid-cols-2">
                            <div class="u-form-field"><label for="u-company">ブランド名 / 会社名</label><input id="u-company" name="company" type="text" required></div>
                            <div class="u-form-field"><label for="u-name">担当者名</label><input id="u-name" name="name" type="text" required></div>
                        </div>
                        <div class="grid gap-5 md:grid-cols-2">
                            <div class="u-form-field"><label for="u-email">メールアドレス</label><input id="u-email" name="email" type="email" required></div>
                            <div class="u-form-field"><label for="u-type">相談カテゴリ</label><select id="u-type" name="type"><option>ブランド制作</option><option>ルック撮影</option><option>ポップアップ企画</option><option>コラボ相談</option></select></div>
                        </div>
                        <div class="u-form-field"><label for="u-message">相談内容</label><textarea id="u-message" name="message" required></textarea></div>
                        <div class="u-form-message" data-form-message aria-live="polite"></div>
                        <button class="u-link-button" type="submit">Send It</button>
                    </form>
                </article>
            </div>
        </section>
    </main>

    <footer class="border-t-4 border-[#38322f] bg-[#101010]"><div class="mx-auto max-w-7xl px-5 py-10 text-sm uppercase tracking-[0.14em] text-slate-500 lg:px-8">© 2026 Urban Street</div></footer>
</div>
<script src="assets/js/script.js" defer></script>
</body>
</html>
