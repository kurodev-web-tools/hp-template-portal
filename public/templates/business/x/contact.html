<body>
  <div class="mobile-menu-backdrop" data-menu-backdrop hidden></div>
  <header class="site-header">
    <div class="shell nav-wrap">
      <a class="brand-mark" href="index.html">X</a>
      <nav class="main-nav" aria-label="メインナビゲーション">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="service.html">Format</a>
        <a href="contact.html" aria-current="page">Entry</a>
      </nav>
      <button class="menu-toggle" type="button" aria-label="メニューを開く" aria-expanded="false" data-menu-toggle aria-controls="x-mobile-menu">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-menu" data-mobile-menu aria-hidden="true" hidden>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="service.html">Format</a>
      <a href="contact.html">Entry</a>
    </div>
  </header>

  <main>
    <section class="shell page-hero reveal">
      <p class="eyebrow">Entry Desk</p>
      <h1>大会開催、参加募集、協賛導線をまとめて受ける。</h1>
      <p>contact も一般的な企業問い合わせではなく、エントリー受付やイベント運営相談に適したレイアウトへ切り替えています。</p>
    </section>

    <section class="shell section reveal">
      <div class="x-contact">
        <div class="contact-panel score-panel">
          <h2>受付区分</h2>
          <ul>
            <li>大会開催の相談</li>
            <li>参加募集ページの制作</li>
            <li>協賛・パートナー案内の掲載</li>
          </ul>
          <p class="note">チーム数、試合数、来場者数などの表示値は仮置きです。運営実数に差し替えてください。</p>
        </div>
        <form class="contact-form" action="#" method="post">
          <label for="x-name">ご担当者名</label>
          <input id="x-name" name="name" type="text" placeholder="例: 佐藤 健">
          <label for="x-org">団体名 / チーム名</label>
          <input id="x-org" name="organization" type="text" placeholder="例: East League Office">
          <label for="x-email">メールアドレス</label>
          <input id="x-email" name="email" type="email" placeholder="info@example.jp">
          <label for="x-detail">ご相談内容</label>
          <textarea id="x-detail" name="detail" rows="6" placeholder="大会種別、開催希望時期、必要な掲載情報など"></textarea>
          <button class="button-primary" type="submit">送信する</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="shell footer-inner">
      <p>X Template / Entry Desk</p>
      <a href="index.html">Back to Home</a>
    </div>
